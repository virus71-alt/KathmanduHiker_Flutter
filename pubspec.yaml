name: yama
description: Yama — modern outdoor social platform for hiking, trekking and trip planning.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_crashlytics: ^4.1.3
  firebase_remote_config: ^5.1.4
  firebase_analytics: ^11.3.4
  firebase_performance: ^0.10.0+8

  # Google Sign-In — federated auth provider for one-tap login.
  google_sign_in: ^6.2.1

  # Secure storage — required by ULTIMATE.md §2.3 for any future token
  # caching. Firebase Auth manages its own tokens via the Keychain/Keystore,
  # but this is here for non-Firebase secrets we may store later.
  flutter_secure_storage: ^9.2.2

  # Structured logger — replaces ad-hoc print()/debugPrint(). Per
  # ULTIMATE.md §9.2, all production logs go through this and never log PII.
  logger: ^2.4.0

  # SHA-256 hashing for Crashlytics user identifiers. Per ULTIMATE.md §3.3.2
  # we never send a raw uid even though Firebase uids are opaque — defence
  # in depth in case a future analytics pipeline mirrors the identifier.
  crypto: ^3.0.6

  # Maps + Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Media & networking
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  http: ^1.2.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  connectivity_plus: ^6.1.0

  # Feedback / SOS siren — uses the phone's built-in ringtone, no asset needed.
  flutter_ringtone_player: ^4.0.0+3
  photo_view: ^0.15.0

  # Background hike tracking
  flutter_local_notifications: ^17.2.3
  flutter_background_service: ^5.0.10
  flutter_background_service_android: ^6.2.7

  # Utility
  intl: ^0.19.0
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  package_info_plus: ^8.1.1

  # State management — Phase 3 Riverpod migration (§1.3).
  # Using 2.6.x with codegen (@riverpod) — same syntax Riverpod 3.x will ship.
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Functional error handling — Either<Failure, T> on all repository returns.
  fpdart: ^1.1.0

dev_dependencies:
  # Strict lint set required by ULTIMATE.md §14.1.
  very_good_analysis: ^6.0.0
  flutter_test:
    sdk: flutter

  # Riverpod codegen — generates *.g.dart provider boilerplate.
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.1

  # In-memory Firestore for unit tests — no Firebase init required.
  fake_cloud_firestore: ^3.1.0

flutter:
  uses-material-design: true
