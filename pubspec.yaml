name: kathmanduhiker
description: Kathmandu Hiker — community hiking app (Flutter port for iOS & Android).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  # Crashlytics — production crash + non-fatal error reporting.
  # Per ULTIMATE.md §3.3, integrated from day one (not after launch).
  firebase_crashlytics: ^4.1.3

  # Google Sign-In — federated auth provider for one-tap login.
  google_sign_in: ^6.2.1

  # Secure storage — required by ULTIMATE.md §2.3 for any future token
  # caching. Firebase Auth manages its own tokens via the Keychain/Keystore,
  # but this is here for non-Firebase secrets we may store later.
  flutter_secure_storage: ^9.2.2

  # Structured logger — replaces ad-hoc print()/debugPrint(). Per
  # ULTIMATE.md §9.2, all production logs go through this and never log PII.
  logger: ^2.4.0

  # Maps + Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Media & networking
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  http: ^1.2.2
  url_launcher: ^6.3.1

  # Feedback / SOS siren — uses the phone's built-in ringtone, no asset needed.
  flutter_ringtone_player: ^4.0.0+3
  photo_view: ^0.15.0

  # Background hike tracking
  flutter_local_notifications: ^17.2.3
  flutter_background_service: ^5.0.10
  flutter_background_service_android: ^6.2.7

  # Utility
  intl: ^0.19.0
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1

dev_dependencies:
  # Strict lint set required by ULTIMATE.md §14.1.
  very_good_analysis: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
