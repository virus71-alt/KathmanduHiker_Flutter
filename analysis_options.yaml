# Lint configuration for Yama.
#
# Per ULTIMATE.md §14.1 we use very_good_analysis as the base rule set —
# it's the strictest practical Dart/Flutter lint pack. A handful of rules
# are disabled below because they would generate thousands of warnings in
# legacy screens (e.g. trail_detail_screen.dart at ~2000 lines) and we want
# to migrate those incrementally in later phases, not all in one PR.
#
# Each disabled rule has a comment explaining WHY and WHEN we plan to
# re-enable it. The goal is to tighten this file every phase, never loosen.

include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    # Generated by Firebase + build tooling — not authored code.
    - lib/firebase_options.dart
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
  errors:
    # Treat info/warning as the same — analyzer fails CI on either.
    # Per ULTIMATE.md §12.4: `flutter analyze --fatal-infos --fatal-warnings`.
    todo: warning

linter:
  rules:
    # ── Pragmatic exclusions (re-enable progressively) ───────────────

    # Phase 5 will split features into modules. Until then, classes live
    # in single-file screens and don't have public-API doc comments.
    public_member_api_docs: false

    # Existing codebase uses 100-column lines extensively. Tightening to
    # 80 in Phase 6's UI refactor.
    lines_longer_than_80_chars: false

    # We use BuildContext after `await` with `mounted` guards, but the
    # lint flags every case. Re-enable after Phase 4 Riverpod migration
    # eliminates most context-after-await patterns.
    use_build_context_synchronously: false

    # Some screens still pass loose dynamic data (e.g. Firestore Map).
    # Phase 3 repository extraction will give us typed boundaries.
    avoid_dynamic_calls: false

    # Big switch-on-enum will be replaced with sealed classes in Phase 3.
    sort_constructors_first: false

    # Useful but very noisy on existing widget trees with many
    # SizedBox/Padding. Re-enable in Phase 6.
    require_trailing_commas: false

    # ── Project conventions ──────────────────────────────────────────

    # Per ULTIMATE.md §9.2 — no print() in production. Already enforced.
    avoid_print: true

    # Force const where possible to keep widget rebuilds cheap (§4.2).
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true

    # Encourage modern Dart constructor sugar.
    use_super_parameters: true

    # Cancellation hygiene — ULTIMATE.md §3.4.
    cancel_subscriptions: true
    close_sinks: true
